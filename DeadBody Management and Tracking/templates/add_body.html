<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Body</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f7f2ea; margin: 0; }
        .wrap { max-width: 760px; margin: 25px auto; background: #fff; border-radius: 10px; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { font-size: 14px; font-weight: 600; }
        input, select, textarea {
            width: 100%;
            border: 1px solid #bbb;
            border-radius: 6px;
            padding: 8px;
            box-sizing: border-box;
        }
        textarea { min-height: 70px; }
        .full { grid-column: 1 / -1; }
        button, a {
            background: #2e1f13;
            color: #fff;
            text-decoration: none;
            border: 0;
            border-radius: 7px;
            padding: 10px 14px;
            cursor: pointer;
        }
        .actions { margin-top: 14px; display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div class="wrap">
        <h2>Register New Body</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <p style="color: {% if category == 'error' %}#b00020{% else %}#0f7a32{% endif %};">{{ message }}</p>
            {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="post" action="/add_body">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="grid">
                <div>
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="">Select</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Unknown</option>
                    </select>
                </div>
                <div>
                    <label>Approx Age</label>
                    <input name="age" type="number" min="0" max="130">
                </div>
                <div>
                    <label>Height</label>
                    <input name="height" placeholder="e.g. 5 ft 8 in">
                </div>
                <div>
                    <label>Body Build</label>
                    <input name="body_build" placeholder="Slim/Medium/Heavy">
                </div>
                <div>
                    <label>Complexion</label>
                    <input name="complexion">
                </div>
                <div>
                    <label>Missing Teeth</label>
                    <input name="teeth" type="number" min="0" max="32">
                </div>
                <div>
                    <label>Date Found</label>
                    <input name="date_found" type="date">
                </div>
                <div>
                    <label>Found Location</label>
                    <input name="found_location" required>
                </div>
                <div class="full">
                    <label>Identifying Marks</label>
                    <textarea name="marks"></textarea>
                </div>
                <div class="full">
                    <label>Clothing Description</label>
                    <textarea name="clothing"></textarea>
                </div>
                <div class="full">
                    <label>Dental Notes</label>
                    <textarea name="dental_notes"></textarea>
                </div>
            </div>
            <div class="actions">
                <button type="submit">Save</button>
                <a href="/dashboard">Back</a>
            </div>
        </form>
    </div>
</body>
</html>
