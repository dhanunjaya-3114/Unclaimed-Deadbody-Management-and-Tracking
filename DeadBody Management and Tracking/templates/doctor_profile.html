
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Page</title>
</head>
<style>
body {
    background-color:#D6A64F ; 
    min-height: 100px;
    padding: 20px;
}

.class1 {
    margin:auto;
    background-color: #ece7d9; 
    width: 90%;
    max-width: 500px; 
    padding: 20px;
    border-radius: 5px;
}
form {
    background-color: #362828; 
    color: white;
    margin-bottom: 15px;
    padding: 15px;
    border-radius: 5px;
    
}

form p {
    margin: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

form p span {
    color: #D6A64F ; 
    font-weight: bold;
}

a {
    display: block;
    width:fit-content;
    margin: 20px;  
    text-decoration: none;
    padding: 10px 20px;
    background-color: #362828; 
    color: white;
    border-radius: 5px;
    font-weight: bold;
}
button {
    background-color: #D35400;
    color: white;
    padding: 8px 15px;
    text-align: center;
    text-decoration: none;
    font-size: 15px;
    margin-left: 10px;
    border-radius: 3px;
}

</style>
<body>
    <div class="class1">
       {% for slot in available_slots %}
          <form method="POST" action="{{ url_for('book_slot', ap_id=slot.ap_id) }}">
            <p>
              <span>{{ slot.ap_date.strftime('%Y-%m-%d') }}</span>
              <span>{{ slot.ap_time.strftime('%H:%M') }}</span>
              <button type="submit">Book</button>
            </p>
          </form>
        {% else %}
          <p>No slots available.</p>
        {% endfor %}
    </div>
        </div>
          <center>  <a href="/dashboard" >Go Back</a></center>
        </div>
</body>
</html>
