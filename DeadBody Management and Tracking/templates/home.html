
<!DOCTYPE html>
<html lang="en">
<head>

    <title>Dead Body Tracking</title>
    <style>
        body {

            font-family: Arial, sans-serif;

            min-height: 100vh;
        }

            max-width: 980px;
            margin: 80px auto;

        }

            padding: 12px 20px;

        <h1>Dead Body Management and Tracking</h1>

        <div class="links">
            <a class="btn" href="/login">Login</a>
            <a class="btn" href="/signup">Signup</a>
