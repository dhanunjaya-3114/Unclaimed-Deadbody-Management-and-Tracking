
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        background-color: #D6A64F;
        padding: 100px ;
    }
    h2{
        text-align:center;
    }
    .class1 {
        max-width: 600px;
        margin: auto;
        background-color: #ece7d9;
        padding: 50px;
        border-radius: 10px;
        }

    h1 {
        color: black;
        text-align: center;
        margin-bottom: 30px;
        }
    input, select {
        width: 100%;
        padding: 10px;
        margin-bottom: 20px;
        border-radius: 5px;
    }
    form {
        font-weight:bold;
    }
    button, a {
        text-decoration:none;
        background-color: #3D211A;
        color: white;
        margin-bottom: 30px;
        padding: 10px 20px;
        border-radius: 5px;
    }
</style>
<body>
    
    <div class="class1">
    <h2>Edit Doctor Details</h2>
    
    <form action="/edit_doctor/{{this_doctor.d_id}}", method="POST">

            <div>
                <label for="doctor_fullname">Full Name:</label>
                <input type="text" id="doctor_fullname" name="doctor_fullname" value="{{this_doctor.d_fullname}}" placeholder="Enter Full Name" required>
            </div>
            <br>
            <div>
                <label for="doctor_licensekey">License Key:</label>
                <input type="text" id="doctor_licensekey" name="doctor_licensekey" value="{{this_doctor.d_licensekey}}" placeholder="Enter License Key" required>
            </div>
            <br>
            <div>
                <label for="doctor_age">Age:</label>
                <input type="number" id="doctor_age" name="doctor_age" value="{{this_doctor.d_age}}" placeholder="Enter Age" required >
            </div>
            <br>
            <div>
                <label for="doctor_department">Department:</label>
                <select id="doctor_department" name="doctor_department" value="{{this_doctor.dptid}}" required>
                    <option value="">-- Select Department --</option>
                    {% for dept in departments %}
                        <option value="{{ dept.dpt_id }}">{{ dept.dpt_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <br>
            <center><button type="submit" value="Update Doctor">Update</button></center>
            <center><a href="/dashboard" >Go Back</a></center>
    </form>
    </div>
</body>
</html>
